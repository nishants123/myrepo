<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive Webpage</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top left, #7928ca, #ff0080 55%, #1f2041 100%);
      color: #f5f7fa;
      min-height: 100vh;
      overflow: hidden;
    }

    .scene {
      position: relative;
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.24);
      border-radius: 28px;
      box-shadow: 0 22px 70px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(16px);
      max-width: 720px;
      width: 100%;
      padding: 2rem 2.5rem;
      cursor: grab;
      user-select: none;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .container:active {
      cursor: grabbing;
      box-shadow: 0 28px 90px rgba(0, 0, 0, 0.45);
    }

    h1 {
      margin-top: 0;
      font-size: clamp(2.4rem, 4vw, 4rem);
    }

    p {
      line-height: 1.8;
      margin: 1.5rem 0;
      color: #d9e5ff;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      margin-top: 1.5rem;
    }

    .button,
    .toggle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 140px;
      padding: 0.95rem 1.6rem;
      border-radius: 999px;
      border: none;
      background: #ff5ccd;
      color: #ffffff;
      text-decoration: none;
      font-weight: 700;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
      cursor: pointer;
    }

    .button:hover,
    .toggle:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 30px rgba(255, 92, 205, 0.36);
    }

    .info {
      font-size: 0.95rem;
      color: #b8c4e8;
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="container" id="draggableCard">
      <h1>Drag Me Around</h1>
      <p>Click and hold this card to move it anywhere inside the page. Use the buttons to toggle the theme or show a message.</p>
      <div class="controls">
        <button class="toggle" id="themeButton">Toggle Theme</button>
        <button class="button" id="messageButton">Show Message</button>
      </div>
      <p class="info" id="statusText">Status: Ready to drag.</p>
    </div>
  </div>

  <script>
    const card = document.getElementById('draggableCard');
    const statusText = document.getElementById('statusText');
    const themeButton = document.getElementById('themeButton');
    const messageButton = document.getElementById('messageButton');

    let offsetX = 0;
    let offsetY = 0;
    let isDragging = false;

    card.addEventListener('pointerdown', (event) => {
      isDragging = true;
      card.setPointerCapture(event.pointerId);
      const rect = card.getBoundingClientRect();
      offsetX = event.clientX - rect.left;
      offsetY = event.clientY - rect.top;
      statusText.textContent = 'Status: Dragging...';
    });

    window.addEventListener('pointermove', (event) => {
      if (!isDragging) return;
      const x = event.clientX - offsetX;
      const y = event.clientY - offsetY;
      card.style.left = `${x}px`;
      card.style.top = `${y}px`;
    });

    window.addEventListener('pointerup', () => {
      if (!isDragging) return;
      isDragging = false;
      statusText.textContent = 'Status: Dropped. Drag again anytime.';
    });

    themeButton.addEventListener('click', () => {
      document.body.classList.toggle('altTheme');
      const activeTheme = document.body.classList.contains('altTheme') ? 'Solar' : 'Ocean';
      statusText.textContent = `Status: Switched to ${activeTheme} theme.`;
    });

    messageButton.addEventListener('click', () => {
      alert('Nice! You made the page interactive and moveable.');
      statusText.textContent = 'Status: Message shown.';
    });

    const styleSheet = document.createElement('style');
    styleSheet.textContent = `
      body.altTheme {
        background: radial-gradient(circle at top right, #00d084, #12002b 70%);
      }

      body.altTheme .container {
        background: rgba(15, 23, 42, 0.95);
        color: #f4f7ff;
      }

      body.altTheme .button,
      body.altTheme .toggle {
        background: #7856ff;
        color: #ffffff;
      }

      body.altTheme .container h1,
      body.altTheme .container p,
      body.altTheme .info {
        color: #f4f7ff;
      }
    `;
    document.head.appendChild(styleSheet);
  </script>
</body>
</html>
