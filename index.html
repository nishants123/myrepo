<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive Webpage</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="scene">
    <div class="graphic-shape"></div>
    <div class="container" id="draggableCard">
      <h1>Drag Me Around</h1>
      <p>Click and hold this card to move it anywhere inside the page. Use the buttons to toggle the theme or show a message.</p>
      <div class="controls">
        <button class="toggle" id="themeButton">Toggle Theme</button>
        <button class="button" id="messageButton">Show Message</button>
      </div>
      <form class="feedback-form" id="feedbackForm">
        <input type="text" id="nameInput" placeholder="Your name" required />
        <textarea id="feedbackInput" placeholder="Write your feedback" required></textarea>
        <button type="submit" class="button">Send Feedback</button>
      </form>
      <p class="info" id="statusText">Status: Ready to drag.</p>
    </div>
  </div>

  <script>
    const card = document.getElementById('draggableCard');
    const statusText = document.getElementById('statusText');
    const themeButton = document.getElementById('themeButton');
    const messageButton = document.getElementById('messageButton');

    let offsetX = 0;
    let offsetY = 0;
    let isDragging = false;

    card.addEventListener('pointerdown', (event) => {
      isDragging = true;
      card.setPointerCapture(event.pointerId);
      const rect = card.getBoundingClientRect();
      offsetX = event.clientX - rect.left;
      offsetY = event.clientY - rect.top;
      statusText.textContent = 'Status: Dragging...';
    });

    window.addEventListener('pointermove', (event) => {
      if (!isDragging) return;
      const x = event.clientX - offsetX;
      const y = event.clientY - offsetY;
      card.style.left = `${x}px`;
      card.style.top = `${y}px`;
    });

    window.addEventListener('pointerup', () => {
      if (!isDragging) return;
      isDragging = false;
      statusText.textContent = 'Status: Dropped. Drag again anytime.';
    });

    themeButton.addEventListener('click', () => {
      document.body.classList.toggle('altTheme');
      const activeTheme = document.body.classList.contains('altTheme') ? 'Solar' : 'Ocean';
      statusText.textContent = `Status: Switched to ${activeTheme} theme.`;
    });

    messageButton.addEventListener('click', () => {
      alert('Nice! You made the page interactive and moveable.');
      statusText.textContent = 'Status: Message shown.';
    });

    const feedbackForm = document.getElementById('feedbackForm');
    const nameInput = document.getElementById('nameInput');
    const feedbackInput = document.getElementById('feedbackInput');

    feedbackForm.addEventListener('submit', (event) => {
      event.preventDefault();
      const name = nameInput.value.trim();
      const feedback = feedbackInput.value.trim();
      if (!name || !feedback) {
        statusText.textContent = 'Status: Please fill in both fields.';
        return;
      }
      statusText.textContent = `Status: Thanks for your feedback, ${name}!`;
      feedbackForm.reset();
    });

    const styleSheet = document.createElement('style');
    styleSheet.textContent = `
      body.altTheme {
        background: radial-gradient(circle at top right, #00d084, #12002b 70%);
      }

      body.altTheme .container {
        background: rgba(15, 23, 42, 0.95);
        color: #f4f7ff;
      }

      body.altTheme .button,
      body.altTheme .toggle {
        background: #7856ff;
        color: #ffffff;
      }

      body.altTheme .container h1,
      body.altTheme .container p,
      body.altTheme .info {
        color: #f4f7ff;
      }
    `;
    document.head.appendChild(styleSheet);
  </script>
</body>
</html>
