<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Webpage</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #4b6cb7, #182848);
      color: #f5f7fa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    .container {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(12px);
      max-width: 720px;
      width: 100%;
      padding: 2rem 2.5rem;
    }

    h1 {
      margin-top: 0;
      font-size: clamp(2.4rem, 4vw, 4rem);
    }

    p {
      line-height: 1.8;
      margin: 1.5rem 0;
      color: #dfe7fb;
    }

    .button {
      display: inline-block;
      padding: 0.95rem 1.8rem;
      border-radius: 999px;
      background: #ff8c42;
      color: #1a1f36;
      text-decoration: none;
      font-weight: 700;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .button:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 30px rgba(255, 140, 66, 0.4);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Welcome to My Webpage</h1>
    <p>This is a simple, responsive landing page created in <strong>index.html</strong>. Use it as a starting point for your project, then customize the content, styles, and layout.
    </p>
    <a class="button" href="#about">Learn More</a>
  </div>
</body>
</html>
